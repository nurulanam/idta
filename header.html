<!DOCTYPE html>
<html>

<head></head>

<body>
    <div class="site-header-bar">
        <nav class="nav-bar container">
            <div class="nav-brand">
                <img src="assets/images/idta-logo.png" alt="iDTA">
            </div>
            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link">Home</a>
                <a href="pricing.html" class="nav-link">Pricing</a>
                <a href="#" class="nav-link">Country Check</a>
                <a href="premium-digital-products.html" class="nav-link">Products</a>
                <a href="faq.html" class="nav-link">FAQ</a>
                <a href="contact-us.html" class="nav-link">Contact us</a>
            </div>
            <div class="nav-actions">
                <a href="application.html" class="btn">Get Your IDP Now <svg class="btn-arrow" width="18" height="18"
                        viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M4 12h16m0 0-6-6m6 6-6 6" stroke="currentColor" stroke-width="2.2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg></a>
                <div class="currency-select" data-currency-select>
                    <button type="button" class="currency-select-trigger" aria-haspopup="listbox"
                        aria-expanded="false">
                        <span class="currency-flag">🇬🇧</span>
                        <span class="currency-code">GBP</span>
                        <svg class="currency-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            aria-hidden="true">
                            <path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </button>
                    <div class="currency-dropdown" role="listbox">
                        <div class="currency-options"></div>
                    </div>
                </div>
            </div>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
        </nav>
    </div>

    <div class="cart-widget cart-widget-floating" data-cart-widget>
        <button type="button" class="cart-trigger" data-cart-toggle aria-haspopup="true" aria-expanded="false"
            aria-label="View cart">
            <svg class="cart-trigger-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M2.5 2.5h2l2.68 12.6a2.2 2.2 0 0 0 2.15 1.74h8.6a2.2 2.2 0 0 0 2.15-1.73l1.55-7.36H5.6"
                    stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="9.3" cy="21" r="1.25" fill="currentColor" />
                <circle cx="17.3" cy="21" r="1.25" fill="currentColor" />
            </svg>
            <span class="cart-badge" data-cart-count hidden>0</span>
        </button>
        <div class="cart-dropdown" data-cart-dropdown>
            <div class="cart-dropdown-header">Your Cart</div>
            <div class="cart-items-list" data-cart-list></div>
            <div class="cart-dropdown-footer">
                <div class="cart-total-row">
                    <span>Total</span>
                    <span data-cart-total>$0.00</span>
                </div>
                <a href="application.html" class="btn btn-block mt-14">Checkout</a>
            </div>
        </div>
    </div>
</body>

</html>
