<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Review your submitted IDP application details.">
    <title>Submission Review (Test Mode) — iDTA</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="preload" href="assets/fonts/poppins-400-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="assets/fonts/poppins-700-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="assets/fonts/poppins-500-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="assets/fonts/poppins-600-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- inlined from assets/js/include.js (source of truth) — saves a render-blocking
         request on the critical path; re-inline into every page if that file changes -->
    <script>
        var __pendingIncludes = [];

        function includeHTML(placeholderId, url) {
            var el = document.getElementById(placeholderId);
            if (!el) return;
            var p = fetch(url, { priority: 'low' })
                .then(function (res) {
                    if (!res.ok) throw new Error('status ' + res.status);
                    return res.text();
                })
                .then(function (html) {
                    var doc = new DOMParser().parseFromString(html, 'text/html');
                    var injected = doc.body.querySelectorAll('script');
                    for (var i = 0; i < injected.length; i++) injected[i].remove();
                    el.outerHTML = doc.body.innerHTML;
                })
                .catch(function (e) {
                    console.error('includeHTML: failed to load "' + url + '" — "#' + placeholderId + '" was left empty.', e);
                });
            __pendingIncludes.push(p);
        }

        function loadScriptsAfterIncludes(srcs) {
            Promise.all(__pendingIncludes).then(function () {
                return srcs.reduce(function (chain, src) {
                    return chain.then(function () {
                        if (typeof src === 'function') { src(); return; }
                        return new Promise(function (resolve) {
                            var s = document.createElement('script');
                            s.src = src;
                            s.onload = resolve;
                            s.onerror = function () {
                                console.error('loadScriptsAfterIncludes: failed to load "' + src + '"');
                                resolve();
                            };
                            document.body.appendChild(s);
                        }).then(function () {
                            var ready = window.__pendingScriptReady;
                            window.__pendingScriptReady = null;
                            return ready;
                        });
                    });
                }, Promise.resolve());
            });
        }
    </script>
</head>

<body>

    <!-- NAV (injected from header.html, no fetch delay: synchronous include) -->
    <div id="site-header"></div>
    <script>includeHTML('site-header', 'includes/header.html');</script>

    <main>

    <!-- PAGE HEADER -->
    <section class="page-header">
        <div class="container">
            <h1 class="h2-lg">Submission Review</h1>
            <div class="breadcrumb">
                <a href="index.html">Home</a>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-current">Submission Review</span>
            </div>
            <p class="lead page-header-lead">Test Mode — this shows exactly what your application submitted, read
                back from the stored JSON. No payment was processed and nothing was sent anywhere.</p>
        </div>
    </section>

    <!-- REVIEW -->
    <section class="legal-section">
        <div class="container">
            <div class="review-wrap">
                <div class="review-empty" id="reviewEmpty" hidden>
                    <p>No submission found. Start an application to see its data here.</p>
                    <a href="application.html" class="btn mt-22">Go to Application
                        <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            aria-hidden="true">
                            <path d="M4 12h16m0 0-6-6m6 6-6 6" stroke="currentColor" stroke-width="2.2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg></a>
                </div>
                <div id="reviewContent" hidden></div>
            </div>
        </div>
    </section>

    <!-- FOOTER (injected from footer.html) -->
    </main>

    <div id="site-footer"></div>
    <script>includeHTML('site-footer', 'includes/footer.html');</script>




    <script>loadScriptsAfterIncludes(['assets/js/cart.js', 'assets/js/countries-data.js', 'assets/js/app.js', 'assets/js/reveal.js', 'assets/js/show.js']);</script>
</body>

</html>
